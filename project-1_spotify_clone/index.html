<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./assets/logo.png">
</head>

<body>
    <div class="main">

        <div class="sidebar">

            <div class="nav">

                <div class="nav-option" style="opacity: 1;">
                    <i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i>
                    <a href="#">Home</a>
                </div>

                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i>
                    <a href="#">Search</a>
                </div>

            </div>

            <div class="library ">

                <div class="option">

                    <div class="lib-option nav-option">
                        <img src="./assets/library_icon.png" alt="Library Icon">
                        <a href="#">Your Library</a>
                    </div>

                    <div class="icons">
                        <i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i>
                        <i class="fa-solid fa-arrow-right" style="color: rgb(255, 255, 255);"></i>
                    </div>

                </div>

                <div class="box">
                    <!-- Box content -->
                </div>

            </div>

        </div>

        <div class="main-content">
            Main
        </div>

        <div class="music-player">
            Music Panel
        </div>

    </div>
</body>

</html>
